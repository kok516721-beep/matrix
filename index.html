<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix System - Welcome</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .welcome-box { background: rgba(0, 20, 0, 0.9); border: 2px solid #0f0; padding: 40px; border-radius: 10px; box-shadow: 0 0 20px #0f0; text-align: center; width: 350px; z-index: 10; }
        h1 { font-size: 24px; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
        .menu-list { list-style: none; padding: 0; margin-top: 30px; }
        .menu-list li { margin: 15px 0; }
        .menu-link { color: #0f0; text-decoration: none; font-size: 18px; border: 1px solid #0f0; padding: 10px 20px; display: block; transition: 0.3s; }
        .menu-link:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        
        #userContent { display: none; } /* Login ဝင်ထားမှ ပြမည့်အပိုင်း */
        #guestContent { display: block; } /* Login မဝင်ရသေးခင် ပြမည့်အပိုင်း */

        .status-text { font-size: 14px; color: #88ff88; margin-top: 20px; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="welcome-box">
        <h1>[ MATRIX TERMINAL ]</h1>

        <div id="guestContent">
            <p class="status-text">STATUS: UNKNOWN ENTITY</p>
            <ul class="menu-list">
                <li><a href="login.html" class="menu-link">>> LOGIN ACCESS</a></li>
                <li><a href="Register.html" class="menu-link">>> CREATE NEW IDENTITY</a></li>
                <li><a href="#" class="menu-link" style="border-color: #666; color: #666;">>> FORGOT PASSWORD?</a></li>
            </ul>
        </div>

        <div id="userContent">
            <p class="status-text">STATUS: AUTHORIZED</p>
            <h3 id="welcomeUser">Welcome, User</h3>
            <ul class="menu-list">
                <li><a href="#" class="menu-link">>> ACCESS DATABASE</a></li>
                <li><button id="btnLogout" class="menu-link" style="width: 100%; background: transparent; cursor: pointer;">>> TERMINAL EXIT</button></li>
            </ul>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const guestContent = document.getElementById('guestContent');
        const userContent = document.getElementById('userContent');
        const welcomeUser = document.getElementById('welcomeUser');

        // Login Status ကို စစ်ဆေးခြင်း
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Login ဝင်ထားလျှင်
                guestContent.style.display = "none";
                userContent.style.display = "block";
                
                // Firestore ကနေ User နာမည်ကို သွားယူမယ်
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    welcomeUser.innerText = "Welcome, " + userDoc.data().fullName;
                }
            } else {
                // Login မဝင်ထားလျှင်
                guestContent.style.display = "block";
                userContent.style.display = "none";
            }
        });

        // Logout Function
        document.getElementById('btnLogout').onclick = () => {
            signOut(auth).then(() => {
                window.location.reload();
            });
        };

        // Matrix Background
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
