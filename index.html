<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .main-container { text-align: center; z-index: 10; }

        /* Matrix Icon/Logo Style */
        .matrix-icon {
            font-size: 80px;
            font-weight: bold;
            text-shadow: 0 0 20px #0f0;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
            animation: glitch 2s infinite;
        }

        @keyframes glitch {
            0% { transform: skew(0deg); }
            20% { transform: skew(2deg); color: #fff; }
            21% { transform: skew(0deg); color: #0f0; }
            50% { transform: skew(-2deg); }
            100% { transform: skew(0deg); }
        }

        /* Buttons Style */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 250px;
            margin: 0 auto;
        }

        .matrix-btn {
            color: #0f0;
            text-decoration: none;
            font-size: 16px;
            border: 1px solid #0f0;
            padding: 12px;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .matrix-btn:hover {
            background: #0f0;
            color: #000;
            box-shadow: 0 0 20px #0f0;
            font-weight: bold;
        }

        .forgot-link {
            font-size: 12px;
            margin-top: 10px;
            opacity: 0.7;
        }

        #bg { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>

    <canvas id="bg"></canvas>

    <div class="main-container">
        <div class="matrix-icon">[ M ]</div>

        <div class="btn-group">
            <a href="login.html" class="matrix-btn">Login Access</a>
            <a href="Register.html" class="matrix-btn">Create account</a>
            <a href="forgot-password.html" class="matrix-btn" style="font-size: 12px; border-color: #004400; color: #008800;">Forgot Password?</a>
        </div>
    </div>

    <script>
        // Matrix Background Effect
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
</html>
