<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - Password Recovery</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .box { background: rgba(0, 20, 0, 0.9); border: 2px solid #0f0; padding: 30px; border-radius: 10px; box-shadow: 0 0 20px #0f0; width: 320px; z-index: 10; text-align: center; }
        h2 { text-shadow: 0 0 10px #0f0; margin-bottom: 25px; }
        input { width: 100%; padding: 10px; background: #000; border: 1px solid #0f0; color: #0f0; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        button { width: 100%; padding: 12px; background: #0f0; color: #000; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0a0; box-shadow: 0 0 15px #0f0; }
        .status { margin-top: 15px; font-size: 13px; min-height: 20px; }
        .links { margin-top: 20px; font-size: 12px; }
        .links a { color: #0f0; text-decoration: none; border-bottom: 1px solid #0f0; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="box">
        <h2>>> RECOVER IDENTITY <<</h2>
        <input type="email" id="email" placeholder="Enter Your Registered Gmail" required>
        <button id="btnReset">SEND RESET LINK</button>
        <div id="status" class="status"></div>
        <div class="links"><a href="login.html">BACK TO LOGIN</a></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('btnReset').onclick = async () => {
            const email = document.getElementById('email').value;
            const statusDiv = document.getElementById('status');
            
            if(!email) { statusDiv.innerText = "Error: Email is required!"; return; }

            try {
                await sendPasswordResetEmail(auth, email);
                statusDiv.style.color = "#0f0";
                statusDiv.innerText = "Check your email for the reset link!";
            } catch (error) {
                statusDiv.style.color = "#f00";
                statusDiv.innerText = "Failed: " + error.message;
            }
        };

        // Matrix Bg
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = fontSize + "px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = letters.charAt(Math.floor(Math.random() * letters.length));
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(draw, 33);
    </script>
</body>
        </html>
