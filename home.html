<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - News Feed</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .navbar { border-bottom: 2px solid #0f0; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 20, 0, 0.9); position: sticky; top: 0; z-index: 100; box-shadow: 0 0 15px #0f0; }
        .btn-nav { border: 1px solid #0f0; color: #0f0; background: transparent; padding: 8px 15px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }
        .btn-nav:hover { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }
        .main-container { max-width: 600px; margin: 20px auto; padding: 10px; }
        
        /* Post Box */
        .post-box { border: 2px solid #0f0; background: rgba(0, 20, 0, 0.9); padding: 20px; margin-bottom: 30px; box-shadow: 0 0 10px #0f0; }
        textarea { width: 100%; background: #000; border: 1px solid #0f0; color: #0f0; padding: 10px; box-sizing: border-box; resize: none; outline: none; margin-bottom: 10px; }
        
        /* Post Cards */
        .post-card { border: 1px solid #0f0; background: rgba(0, 10, 0, 0.8); padding: 15px; margin-bottom: 20px; position: relative; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #030; padding-bottom: 8px; }
        .post-user-img { width: 35px; height: 35px; border: 1px solid #0f0; border-radius: 50%; object-fit: cover; }
        .post-info { flex-grow: 1; }
        .post-user-name { font-weight: bold; font-size: 14px; color: #fff; display: block; }
        .post-time { font-size: 10px; color: #0a0; }
        
        /* Menu Button (...) */
        .post-menu-btn { cursor: pointer; color: #0f0; font-size: 20px; padding: 0 10px; }
        .menu-dropdown { 
            position: absolute; right: 10px; top: 40px; background: #000; 
            border: 1px solid #0f0; display: none; z-index: 50; 
            box-shadow: 0 0 10px #0f0;
        }
        .menu-dropdown button { 
            display: block; width: 100%; padding: 10px; background: none; 
            border: none; color: #0f0; text-align: left; cursor: pointer; font-family: inherit;
        }
        .menu-dropdown button:hover { background: #0f0; color: #000; }

        .post-content { white-space: pre-wrap; margin-bottom: 10px; color: #0f0; }
        .post-media img, .post-media video { width: 100%; border: 1px solid #030; margin-top: 10px; max-height: 450px; object-fit: contain; }
        
        .file-label { display: inline-block; border: 1px dashed #0f0; padding: 5px 10px; margin-bottom: 15px; cursor: pointer; font-size: 11px; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="navbar">
        <div id="userDisplay" style="font-weight: bold;">[ CONNECTING... ]</div>
        <div class="nav-links">
            <a href="profile.html" class="btn-nav">PROFILE</a>
        </div>
    </div>

    <div class="main-container">
        <div class="post-box">
            <textarea id="postText" rows="3" placeholder="Initializing thought sequence..."></textarea>
            <label for="fileInput" class="file-label">>> ATTACH MEDIA (IMG/VIDEO)</label>
            <input type="file" id="fileInput" accept="image/*,video/*">
            <div id="fileNameDisplay" style="font-size: 10px; color: #0a0; margin-bottom: 10px;"></div>
            <button class="btn-nav" id="btnPost" style="width: 100%;">EXECUTE POST</button>
        </div>
        <div id="newsFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLOUD_NAME = "dbrgjktoz"; 
        const UPLOAD_PRESET = "my-upload"; 

        let currentUid = "";
        let currentEmail = "";
        let currentUserName = "User";
        let currentUserPhoto = "https://cdn-icons-png.flaticon.com/512/711/711769.png";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                currentEmail = user.email;
                const userDoc = await getDoc(doc(db, "users", currentUid));
                if (userDoc.exists()) {
                    currentUserName = userDoc.data().fullName || "User";
                    currentUserPhoto = userDoc.data().photoURL || currentUserPhoto;
                }
                document.getElementById('userDisplay').textContent = "CONNECTED: " + currentUserName.toUpperCase();
                loadPosts();
            } else { window.location.href = "login.html"; }
        });

        // Execute Post
        document.getElementById('btnPost').onclick = async () => {
            const text = document.getElementById('postText').value.trim();
            const file = document.getElementById('fileInput').files[0];
            if (!text && !file) return;

            const btn = document.getElementById('btnPost');
            btn.textContent = "UPLOADING..."; btn.disabled = true;

            let mediaUrl = ""; let mediaType = "";
            if (file) {
                const formData = new FormData();
                formData.append("file", file);
                formData.append("upload_preset", UPLOAD_PRESET);
                const resourceType = file.type.startsWith("video") ? "video" : "image";
                try {
                    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`, { method: "POST", body: formData });
                    const data = await res.json();
                    mediaUrl = data.secure_url; mediaType = resourceType;
                } catch (err) { console.error(err); }
            }

            try {
                await addDoc(collection(db, "posts"), {
                    userId: currentUid, userName: currentUserName, userPhoto: currentUserPhoto,
                    content: text, media: mediaUrl, type: mediaType, createdAt: serverTimestamp()
                });
                document.getElementById('postText').value = "";
                document.getElementById('fileInput').value = "";
                document.getElementById('fileNameDisplay').textContent = "";
            } catch (e) { alert("Execution error!"); }
            btn.textContent = "EXECUTE POST"; btn.disabled = false;
        };

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('newsFeed');
                feed.innerHTML = "";
                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const postId = postDoc.id;
                    const isOwner = post.userId === currentUid || currentEmail === "soeer"; // Admin Check
                    
                    // Time Formatting
                    const time = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : "Syncing...";

                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPhoto}" class="post-user-img">
                            <div class="post-info">
                                <span class="post-user-name">${post.userName}</span>
                                <span class="post-time">${time}</span>
                            </div>
                            ${isOwner ? `<div class="post-menu-btn" onclick="toggleMenu('${postId}')">⋮</div>` : ""}
                            <div id="menu-${postId}" class="menu-dropdown">
                                <button onclick="editPost('${postId}', '${post.content.replace(/'/g, "\\'")}')">EDIT</button>
                                <button style="color:red;" onclick="deletePost('${postId}')">DELETE</button>
                            </div>
                        </div>
                        <div class="post-content" id="content-${postId}">${post.content}</div>
                        ${post.media ? `<div class="post-media">${post.type === 'video' ? `<video src="${post.media}" controls></video>` : `<img src="${post.media}">`}</div>` : ""}
                    `;
                    feed.appendChild(card);
                });
            });
        }

        // Global functions for buttons
        window.toggleMenu = (id) => {
            const menu = document.getElementById(`menu-${id}`);
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        };

        window.deletePost = async (id) => {
            if(confirm("Are you sure to DELETE this sequence?")) {
                await deleteDoc(doc(db, "posts", id));
            }
        };

        window.editPost = async (id, oldContent) => {
            const newContent = prompt("Edit your thought sequence:", oldContent);
            if (newContent !== null && newContent.trim() !== "") {
                await updateDoc(doc(db, "posts", id), { content: newContent });
            }
        };

        // Matrix Background
        const canvas = document.getElementById('bg'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(33 + Math.random() * 94), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
