<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News Feed</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.6; }

        .navbar { 
            border-bottom: 2px solid #0f0; padding: 15px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0, 20, 0, 0.8); position: sticky; top: 0; z-index: 100; 
        }
        .btn-nav { border: 1px solid #0f0; color: #0f0; background: transparent; padding: 8px 15px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }

        .main-container { max-width: 600px; margin: 20px auto; padding: 10px; position: relative; z-index: 1; }
        
        /* Post Box & Feed Box Transparency */
        .post-box, .post-card { 
            border: 1px solid #0f0; 
            background: rgba(0, 15, 0, 0.5); /* Matrix စာလုံးတွေ မြင်ရအောင် 50% transparency သုံးထားပါတယ် */
            padding: 15px; margin-bottom: 20px; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); 
        }
        
        textarea { width: 100%; background: rgba(0, 0, 0, 0.6); border: 1px solid #0f0; color: #0f0; padding: 10px; box-sizing: border-box; resize: none; outline: none; }
        
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #030; padding-bottom: 8px; }
        .post-user-img { width: 35px; height: 35px; border: 1px solid #0f0; border-radius: 50%; object-fit: cover; }
        .post-info { flex-grow: 1; }
        .post-user-name { font-weight: bold; font-size: 14px; color: #fff; }
        .post-time { font-size: 10px; color: #0a0; display: block; }
        
        .menu-container { position: relative; }
        .post-menu-btn { cursor: pointer; color: #0f0; font-size: 20px; padding: 0 5px; }
        .menu-dropdown { 
            position: absolute; right: 0; top: 25px; background: #000; 
            border: 1px solid #0f0; display: none; z-index: 100; min-width: 120px;
        }
        .menu-dropdown button { 
            display: block; width: 100%; padding: 10px; background: none; 
            border: none; color: #0f0; text-align: left; cursor: pointer; font-size: 12px;
        }
        .menu-dropdown button:hover { background: #0f0; color: #000; }

        .post-content { white-space: pre-wrap; margin: 10px 0; font-size: 14px; }
        .post-media img, .post-media video { width: 100%; border: 1px solid #030; margin-top: 10px; max-height: 450px; object-fit: contain; }
        .file-label { display: inline-block; border: 1px dashed #0f0; padding: 5px 10px; margin: 10px 0; cursor: pointer; font-size: 11px; }
        #fileInput, #editFileInput { display: none; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="navbar">
        <div id="userDisplay">[ CONNECTING... ]</div>
        <a href="profile.html" class="btn-nav">PROFILE</a>
    </div>

    <input type="file" id="editFileInput" accept="image/*,video/*">

    <div class="main-container">
        <div class="post-box">
            <textarea id="postText" rows="3" placeholder="What's in your mind, Entity?"></textarea>
            <label for="fileInput" class="file-label">>> ATTACH MEDIA</label>
            <input type="file" id="fileInput" accept="image/*,video/*">
            <button class="btn-nav" id="btnPost" style="width: 100%;">EXECUTE POST</button>
        </div>
        <div id="newsFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLOUD_NAME = "dbrgjktoz"; 
        const UPLOAD_PRESET = "my-upload"; 

        let currentUid = "", currentEmail = "", currentUserName = "User", currentUserPhoto = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid; currentEmail = user.email;
                const userDoc = await getDoc(doc(db, "users", currentUid));
                if (userDoc.exists()) {
                    currentUserName = userDoc.data().fullName || "User";
                    currentUserPhoto = userDoc.data().photoURL || "https://cdn-icons-png.flaticon.com/512/711/711769.png";
                }
                document.getElementById('userDisplay').textContent = "CONNECTED: " + currentUserName.toUpperCase();
                loadPosts();
            } else { window.location.href = "login.html"; }
        });

        async function uploadMedia(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            const type = file.type.startsWith("video") ? "video" : "image";
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`, { method: "POST", body: formData });
            const data = await res.json();
            return { url: data.secure_url, type };
        }

        document.getElementById('btnPost').onclick = async () => {
            const text = document.getElementById('postText').value.trim();
            const file = document.getElementById('fileInput').files[0];
            if (!text && !file) return;

            const btn = document.getElementById('btnPost');
            btn.textContent = "UPLOADING..."; btn.disabled = true;

            let mediaUrl = "", mediaType = "";
            if (file) {
                const uploaded = await uploadMedia(file);
                mediaUrl = uploaded.url; mediaType = uploaded.type;
            }

            try {
                await addDoc(collection(db, "posts"), {
                    userId: currentUid, userName: currentUserName, userPhoto: currentUserPhoto,
                    content: text, media: mediaUrl, type: mediaType, createdAt: serverTimestamp()
                });
                document.getElementById('postText').value = "";
                document.getElementById('fileInput').value = "";
            } catch (e) { alert("Post Failed!"); }
            btn.textContent = "EXECUTE POST"; btn.disabled = false;
        };

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('newsFeed');
                feed.innerHTML = "";
                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const postId = postDoc.id;
                    const isOwner = post.userId === currentUid || currentEmail === "soeer73@gmail.com";
                    const time = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : "...";

                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPhoto}" class="post-user-img">
                            <div class="post-info">
                                <span class="post-user-name">${post.userName}</span>
                                <span class="post-time">${time}</span>
                            </div>
                            ${isOwner ? `
                            <div class="menu-container">
                                <div class="post-menu-btn" onclick="toggleMenu('${postId}')">⋮</div>
                                <div id="menu-${postId}" class="menu-dropdown">
                                    <button onclick="editFull('${postId}', \`${post.content.replace(/`/g, '\\`')}\`)">EDIT ALL</button>
                                    <button style="color:red;" onclick="deletePost('${postId}')">DELETE</button>
                                </div>
                            </div>` : ""}
                        </div>
                        <div class="post-content">${post.content}</div>
                        ${post.media ? `<div class="post-media">${post.type === 'video' ? `<video src="${post.media}" controls></video>` : `<img src="${post.media}">`}</div>` : ""}
                    `;
                    feed.appendChild(card);
                });
            });
        }

        window.toggleMenu = (id) => {
            const menu = document.getElementById(`menu-${id}`);
            document.querySelectorAll('.menu-dropdown').forEach(m => m.style.display = 'none');
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        };

        window.deletePost = async (id) => {
            if(confirm("Confirm deletion?")) await deleteDoc(doc(db, "posts", id));
        };

        window.editFull = async (id, oldText) => {
            const newText = prompt("Edit Text:", oldText);
            if (newText === null) return;

            if(confirm("Change Media (Photo/Video) as well?")) {
                const editInput = document.getElementById('editFileInput');
                editInput.onchange = async (e) => {
                    const file = e.target.files[0];
                    if(file) {
                        alert("Uploading new media...");
                        const up = await uploadMedia(file);
                        await updateDoc(doc(db, "posts", id), { content: newText, media: up.url, type: up.type });
                        alert("Updated Successfully!");
                    }
                };
                editInput.click();
            } else {
                await updateDoc(doc(db, "posts", id), { content: newText });
            }
        };

        // Matrix Background
        const canvas = document.getElementById('bg'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(33 + Math.random() * 94), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
