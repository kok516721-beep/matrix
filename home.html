<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - Ultimate News Feed</title>
    <style>
        :root { --matrix-green: #0f0; --matrix-dark: #000; --matrix-glow: rgba(0, 255, 0, 0.3); }
        body { background-color: var(--matrix-dark); color: var(--matrix-green); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.6; }

        /* Navbar UI */
        .navbar { border-bottom: 2px solid var(--matrix-green); padding: 10px 15px; display: flex; justify-content: center; align-items: center; background: rgba(0, 20, 0, 0.9); position: sticky; top: 0; z-index: 100; }
        .nav-links { display: flex; gap: 8px; width: 100%; justify-content: space-between; max-width: 500px; }
        .btn-nav { border: 1px solid var(--matrix-green); color: var(--matrix-green); background: transparent; padding: 8px 10px; cursor: pointer; text-decoration: none; font-size: 11px; font-weight: bold; text-transform: uppercase; transition: 0.3s; position: relative; text-align: center; flex: 1; }
        .btn-nav:hover { background: var(--matrix-green); color: #000; box-shadow: 0 0 15px var(--matrix-green); }
        .noti-badge { position: absolute; top: -5px; right: -2px; background: #f00; color: #fff; border-radius: 50%; padding: 2px 5px; font-size: 8px; }

        /* Panels */
        #notiPanel, #userDiscovery, #msgPanel { display: none; border: 1px solid var(--matrix-green); background: rgba(0, 20, 0, 0.95); padding: 15px; margin-bottom: 20px; box-shadow: 0 0 15px var(--matrix-glow); }
        .section-title { font-size: 12px; color: #fff; margin-bottom: 10px; border-left: 3px solid #0f0; padding-left: 8px; text-transform: uppercase; }

        /* Feed & Posts */
        .main-container { max-width: 600px; margin: 20px auto; padding: 10px; position: relative; z-index: 1; }
        .post-box, .post-card { border: 1px solid var(--matrix-green); background: rgba(0, 15, 0, 0.85); padding: 15px; margin-bottom: 20px; box-shadow: 0 0 10px var(--matrix-glow); }
        
        textarea, .comment-input { width: 100%; background: #000; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 10px; box-sizing: border-box; resize: none; outline: none; }
        
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #030; padding-bottom: 8px; }
        .post-user-img { width: 40px; height: 40px; border: 1px solid var(--matrix-green); border-radius: 50%; object-fit: cover; }
        .post-info { flex-grow: 1; }
        .post-user-name { font-weight: bold; font-size: 14px; color: #fff; }
        .timestamp { font-size: 10px; color: #0a0; display: block; }

        /* Comments Styling */
        .comment-section { display: none; margin-top: 10px; border-top: 1px solid #020; padding-top: 10px; }
        .comment-item { background: rgba(0, 30, 0, 0.4); padding: 8px; margin-bottom: 8px; border-left: 2px solid var(--matrix-green); position: relative; }
        .comment-media { max-width: 100%; border-radius: 4px; margin-top: 5px; border: 1px solid #030; display: block; }
        
        .comment-input-area { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .input-row { display: flex; gap: 8px; align-items: center; }
        .btn-icon { cursor: pointer; font-size: 18px; }
        .selected-info { font-size: 9px; color: #0f0; display: none; }
        .comment-cancel { display: none; color: #f00; border-color: #f00; font-size: 10px; padding: 5px 8px; min-width: 35px; }

        /* Dropdowns */
        .dot-btn { cursor: pointer; padding: 5px; font-weight: bold; font-size: 18px; }
        .menu-dropdown { position: absolute; right: 0; top: 30px; background: #000; border: 1px solid var(--matrix-green); z-index: 50; display: none; min-width: 120px; }
        .menu-dropdown button { display: block; width: 100%; padding: 10px; background: none; border: none; color: var(--matrix-green); cursor: pointer; text-align: left; font-size: 11px; }

        #matrixModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { border: 2px solid var(--matrix-green); background: #000; padding: 30px; text-align: center; max-width: 320px; width: 90%; }
        
        video, img.post-media { background: #000; max-height: 450px; width: 100%; object-fit: contain; margin-top: 10px; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(0, 20, 0, 0.9); border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 10px 20px; z-index: 2000; display: none; font-size: 11px; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div id="toast">SYSTEM_READY</div>

    <div id="matrixModal">
        <div class="modal-content">
            <div class="modal-header" id="modalHeader">[ ALERT ]</div>
            <div class="modal-msg" id="modalMsg">CONFIRM ACTION?</div>
            <div style="display:flex; gap:10px; justify-content:center; margin-top:20px;">
                <button class="btn-nav" id="confirmOk">YES</button>
                <button class="btn-nav" id="confirmNo" style="border-color:#f00; color:#f00;">CANCEL</button>
            </div>
        </div>
    </div>

    <div class="navbar">
        <div class="nav-links">
            <div class="btn-nav" onclick="window.toggleSection('msgPanel')">💬 MSGS</div>
            <div class="btn-nav" onclick="window.toggleSection('notiPanel')">🔔 NOTI <span id="notiCount" class="noti-badge">0</span></div>
            <div class="btn-nav" onclick="window.toggleSection('userDiscovery')">🔍 FIND</div>
            <a href="profile.html" class="btn-nav">PROFILE</a>
        </div>
    </div>

    <div class="main-container">
        <div id="msgPanel">
            <div class="section-title">>> ENCRYPTED_MESSAGES</div>
            <div style="font-size:10px; opacity:0.6;">No communications found.</div>
        </div>
        <div id="notiPanel">
            <div class="section-title">>> ACCESS_REQUESTS</div>
            <div id="reqList">No pending requests</div>
        </div>
        <div id="userDiscovery">
            <div class="section-title">>> NETWORK_USERS</div>
            <div id="allUsersList">Scanning...</div>
        </div>

        <div class="post-box">
            <h3 id="boxHeader" style="font-size: 11px; margin-top: 0; color: var(--matrix-green);">>> SYSTEM_INPUT_POST</h3>
            <textarea id="postText" rows="3" placeholder="Enter post data..."></textarea>
            <div style="margin-top: 10px; display:flex; align-items:center; justify-content:space-between;">
                <div>
                    <label for="fileInput" class="btn-nav" style="padding: 5px 10px;">ATTACH_MEDIA</label>
                    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
                </div>
                <span id="fileName" style="font-size: 9px; color:#0a0;"></span>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="btn-nav" id="btnExecute">POST</button>
                <button class="btn-nav" id="btnCancelEdit" style="display: none; border-color: #f00; color: #f00;">CANCEL</button>
            </div>
        </div>

        <div id="newsFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, updateDoc, arrayUnion, arrayRemove, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUid = "", userData = {};
        let editMode = false, editingPostId = null;

        // --- Helpers ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = `[ ${msg} ]`;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 3000);
        }

        window.toggleSection = (id) => {
            ['notiPanel', 'userDiscovery', 'msgPanel'].forEach(p => {
                const el = document.getElementById(p);
                el.style.display = (p === id && el.style.display !== 'block') ? 'block' : 'none';
            });
            if(id === 'userDiscovery') loadAllUsers();
        };

        // --- Cloudinary ---
        async function uploadMedia(file) {
            const type = file.type.startsWith('video') ? 'video' : 'image';
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "my-upload");
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dbrgjktoz/${type}/upload`, { method: "POST", body: formData });
                const data = await res.json();
                return { url: data.secure_url, type };
            } catch (e) { return null; }
        }

        // --- Auth ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                onSnapshot(doc(db, "users", currentUid), (snap) => {
                    if (snap.exists()) {
                        userData = snap.data();
                        document.getElementById('notiCount').textContent = userData.friendRequests?.length || 0;
                    }
                });
                loadPosts();
            } else { window.location.href = "login.html"; }
        });

        // --- Post Logic ---
        document.getElementById('fileInput').onchange = (e) => {
            document.getElementById('fileName').textContent = e.target.files[0] ? `[ ${e.target.files[0].name.substring(0,10)}... ]` : "";
        };

        document.getElementById('btnExecute').onclick = async () => {
            const text = document.getElementById('postText').value.trim();
            const file = document.getElementById('fileInput').files[0];
            if (!text && !file && !editMode) return;
            const btn = document.getElementById('btnExecute');
            btn.disabled = true; btn.textContent = "SYNCING...";
            let mediaData = { url: "", type: "" };
            if (file) { const res = await uploadMedia(file); if (res) mediaData = res; }
            try {
                if (editMode) {
                    const upData = { content: text };
                    if (mediaData.url) { upData.media = mediaData.url; upData.mediaType = mediaData.type; }
                    await updateDoc(doc(db, "posts", editingPostId), upData);
                    showToast("UPDATE_OK"); window.resetEditor();
                } else {
                    await addDoc(collection(db, "posts"), {
                        userId: currentUid, userName: userData.fullName, userPhoto: userData.photoURL,
                        content: text, media: mediaData.url, mediaType: mediaData.type,
                        createdAt: serverTimestamp(), likes: [], comments: []
                    });
                    showToast("POST_OK");
                }
                document.getElementById('postText').value = "";
                document.getElementById('fileInput').value = "";
                document.getElementById('fileName').textContent = "";
            } catch(e) { showToast("ERROR"); }
            btn.disabled = false; btn.textContent = editMode ? "UPDATE" : "POST";
        };

        // --- Feed & Comment Rendering ---
        function loadPosts() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
                const feed = document.getElementById('newsFeed');
                feed.innerHTML = "";
                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const pid = postDoc.id;
                    const isLiked = post.likes?.includes(currentUid);
                    let mediaHTML = post.media ? (post.mediaType === 'video' ? `<video src="${post.media}" controls></video>` : `<img src="${post.media}" class="post-media">`) : "";
                    
                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header" style="position:relative;">
                            <img src="${post.userPhoto}" class="post-user-img">
                            <div class="post-info">
                                <span class="post-user-name">${post.userName}</span>
                                <span class="timestamp">${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : "Just now"}</span>
                            </div>
                            <div class="dot-btn" onclick="window.toggleMenu('m-${pid}')">⋮</div>
                            <div id="m-${pid}" class="menu-dropdown">
                                ${post.userId === currentUid ? `<button onclick="window.startEdit('${pid}', \`${post.content}\`)">EDIT</button><button onclick="window.deletePost('${pid}')">DELETE</button>` : `<button>REPORT</button>`}
                            </div>
                        </div>
                        <div style="margin:10px 0; white-space:pre-wrap; font-size:14px;">${post.content}</div>
                        ${mediaHTML}
                        <div class="post-actions">
                            <div class="action-btn ${isLiked?'liked':''}" onclick="window.handleLike('${pid}', ${isLiked})">❤️ ${post.likes?.length || 0}</div>
                            <div class="action-btn" onclick="window.toggleComments('${pid}')">💬 ${post.comments?.length || 0}</div>
                        </div>
                        <div class="comment-section" id="sec-${pid}">
                            <div id="list-${pid}"></div>
                            <div class="comment-input-area">
                                <span id="cinfo-${pid}" class="selected-info"></span>
                                <div class="input-row">
                                    <input type="text" id="inp-${pid}" class="comment-input" placeholder="Type..." oninput="window.handleCommentInput('${pid}')">
                                    <label class="btn-icon">📷<input type="file" id="cfile-${pid}" style="display:none;" onchange="window.handleCommentInput('${pid}')"></label>
                                    <button class="btn-nav" style="flex:none;" onclick="window.addComment('${pid}')">SEND</button>
                                    <button id="cx-${pid}" class="btn-nav comment-cancel" onclick="window.clearComment('${pid}')">X</button>
                                </div>
                            </div>
                        </div>`;
                    feed.appendChild(card);
                    window.renderComments(pid, post.comments);
                });
            });
        }

        // --- Comment Logic (Photo/Video + Cancel Button) ---
        window.handleCommentInput = (pid) => {
            const text = document.getElementById(`inp-${pid}`).value.trim();
            const file = document.getElementById(`cfile-${pid}`).files[0];
            const cancelBtn = document.getElementById(`cx-${pid}`);
            const info = document.getElementById(`cinfo-${pid}`);
            
            if(file) { info.textContent = `>> FILE: ${file.name.substring(0,10)}...`; info.style.display = 'block'; }
            else { info.style.display = 'none'; }

            // Show cancel button only if there is text or file
            cancelBtn.style.display = (text || file) ? 'block' : 'none';
        };

        window.clearComment = (pid) => {
            document.getElementById(`inp-${pid}`).value = "";
            document.getElementById(`cfile-${pid}`).value = "";
            window.handleCommentInput(pid);
        };

        window.renderComments = (pid, comments) => {
            const listEl = document.getElementById(`list-${pid}`);
            if(!listEl || !comments) return;
            listEl.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <b style="color:#0f0; font-size:11px;">${c.userName}:</b> <span>${c.text}</span>
                    ${c.media ? (c.mediaType === 'video' ? `<video src="${c.media}" class="comment-media" controls></video>` : `<img src="${c.media}" class="comment-media">`) : ""}
                </div>`).join('');
        };

        window.addComment = async (pid) => {
            const input = document.getElementById(`inp-${pid}`);
            const file = document.getElementById(`cfile-${pid}`).files[0];
            const text = input.value.trim();
            if(!text && !file) return;

            showToast("UPLOADING_COMMENT...");
            let mData = { url: "", type: "" };
            if (file) { const res = await uploadMedia(file); if (res) mData = res; }

            await updateDoc(doc(db, "posts", pid), {
                comments: arrayUnion({
                    userId: currentUid, userName: userData.fullName,
                    text: text, media: mData.url, mediaType: mData.type,
                    createdAt: Date.now()
                })
            });
            window.clearComment(pid);
            showToast("COMMENT_OK");
        };

        // --- Global Actions ---
        window.handleLike = async (id, liked) => { 
            await updateDoc(doc(db, "posts", id), { likes: liked ? arrayRemove(currentUid) : arrayUnion(currentUid) }); 
        };
        window.toggleComments = (id) => { 
            const s = document.getElementById(`sec-${id}`); 
            s.style.display = (s.style.display === 'block') ? 'none' : 'block'; 
        };
        window.toggleMenu = (id) => { 
            document.querySelectorAll('.menu-dropdown').forEach(el => el.style.display = (el.id === id && el.style.display !== 'block') ? 'block' : 'none');
        };
        window.deletePost = (pid) => {
            if(confirm("Wipe this data?")) { deleteDoc(doc(db, "posts", pid)); showToast("WIPED"); }
        };
        window.startEdit = (id, text) => {
            editMode = true; editingPostId = id;
            document.getElementById('postText').value = text;
            document.getElementById('boxHeader').textContent = ">> EDIT_MODE";
            document.getElementById('btnExecute').textContent = "UPDATE";
            document.getElementById('btnCancelEdit').style.display = "block";
            window.scrollTo(0,0);
        };
        window.resetEditor = () => {
            editMode = false; editingPostId = null;
            document.getElementById('boxHeader').textContent = ">> SYSTEM_INPUT_POST";
            document.getElementById('btnExecute').textContent = "POST";
            document.getElementById('btnCancelEdit').style.display = "none";
            document.getElementById('postText').value = "";
        };
        document.getElementById('btnCancelEdit').onclick = window.resetEditor;

        // Matrix Background
        const canvas = document.getElementById('bg'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(33+Math.random()*94), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
