<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - Core Feed</title>
    <style>
        :root { --matrix-green: #0f0; --matrix-dark: #000; --matrix-glow: rgba(0, 255, 0, 0.3); }
        body { background-color: var(--matrix-dark); color: var(--matrix-green); font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.5; }

        /* Navbar - Balanced Layout */
        .navbar { border-bottom: 2px solid var(--matrix-green); padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: rgba(0, 20, 0, 0.95); position: sticky; top: 0; z-index: 100; }
        #userDisplay { font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 120px; }
        .nav-links { display: flex; gap: 6px; }
        .btn-nav { border: 1px solid var(--matrix-green); color: var(--matrix-green); background: transparent; padding: 6px 8px; cursor: pointer; text-decoration: none; font-size: 10px; font-weight: bold; text-transform: uppercase; transition: 0.2s; position: relative; text-align: center; }
        .btn-nav:hover { background: var(--matrix-green); color: #000; box-shadow: 0 0 10px var(--matrix-green); }
        .noti-badge { position: absolute; top: -5px; right: -2px; background: #f00; color: #fff; border-radius: 50%; padding: 1px 4px; font-size: 8px; }

        /* Main Container */
        .main-container { max-width: 550px; margin: 15px auto; padding: 10px; position: relative; z-index: 1; }
        .post-box, .post-card { border: 1px solid var(--matrix-green); background: rgba(0, 10, 0, 0.9); padding: 15px; margin-bottom: 15px; box-shadow: 0 0 8px var(--matrix-glow); }
        
        textarea, .comment-input { width: 100%; background: #000; border: 1px solid var(--matrix-green); color: var(--matrix-green); padding: 10px; box-sizing: border-box; resize: none; outline: none; font-size: 13px; }
        
        /* Post Header Improvements */
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #020; padding-bottom: 10px; position: relative; }
        .post-user-img { width: 38px; height: 38px; border: 1px solid var(--matrix-green); border-radius: 50%; object-fit: cover; }
        .post-info { flex-grow: 1; }
        .post-user-name { font-weight: bold; font-size: 13px; color: #fff; display: block; }
        .timestamp { font-size: 9px; color: #0a0; }

        /* Action Buttons Row */
        .post-actions { display: flex; gap: 20px; border-top: 1px solid #020; padding-top: 10px; margin-top: 10px; font-size: 12px; }
        .action-btn { cursor: pointer; display: flex; align-items: center; gap: 5px; opacity: 0.8; }
        .action-btn:hover { opacity: 1; text-shadow: 0 0 5px #0f0; }
        .liked { color: #f00; text-shadow: 0 0 5px #f00; }

        /* Balanced Post Box Buttons */
        .box-controls { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; gap: 10px; }
        .file-label { flex-grow: 1; font-size: 10px; border: 1px dashed #050; padding: 6px; text-align: center; cursor: pointer; }

        /* Comment System UI */
        .comment-section { margin-top: 10px; border-top: 1px solid #030; padding-top: 10px; display: none; }
        .comment-item { background: rgba(0, 30, 0, 0.3); padding: 8px; margin-bottom: 8px; border-left: 2px solid var(--matrix-green); font-size: 12px; }
        .comment-media { max-width: 100%; border: 1px solid #040; margin-top: 5px; display: block; border-radius: 2px; }
        
        /* Fixed Comment Input Area */
        .comment-input-area { display: flex; flex-direction: column; gap: 6px; margin-top: 12px; }
        .input-row { display: flex; gap: 8px; align-items: center; width: 100%; }
        .comment-cancel-btn { display: none; color: #f00; border-color: #f00; font-size: 10px; padding: 7px; min-width: 35px; }

        /* Menus */
        .dot-btn { cursor: pointer; padding: 0 5px; font-size: 18px; color: var(--matrix-green); }
        .menu-dropdown { position: absolute; right: 0; top: 35px; background: #000; border: 1px solid var(--matrix-green); z-index: 50; display: none; min-width: 110px; }
        .menu-dropdown button { display: block; width: 100%; padding: 10px; background: none; border: none; color: var(--matrix-green); cursor: pointer; text-align: left; font-size: 10px; }
        .menu-dropdown button:hover { background: var(--matrix-green); color: #000; }

        video, img.post-media { background: #000; max-height: 400px; width: 100%; object-fit: contain; margin-top: 10px; border: 1px solid #020; }
        #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0, 20, 0, 0.9); border: 1px solid var(--matrix-green); padding: 8px 15px; z-index: 2000; display: none; font-size: 10px; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div id="toast">BOOTING_SYSTEM...</div>

    <div class="navbar">
        <div id="userDisplay">[ CONNECTING... ]</div>
        <div class="nav-links">
            <div class="btn-nav" onclick="window.toggleSection('notiPanel')">🔔 NOTI <span id="notiCount" class="noti-badge">0</span></div>
            <div class="btn-nav" onclick="window.toggleSection('userDiscovery')">🔍 FIND</div>
            <a href="profile.html" class="btn-nav">PROFILE</a>
        </div>
    </div>

    <div class="main-container">
        <div id="notiPanel" style="display:none; border: 1px solid #0f0; padding: 10px; margin-bottom: 15px; background: rgba(0,20,0,0.9);">
            <div style="font-size: 10px; border-bottom: 1px solid #030; margin-bottom: 10px;">>> ACCESS_REQUESTS</div>
            <div id="reqList">No data.</div>
        </div>

        <div id="userDiscovery" style="display:none; border: 1px solid #0f0; padding: 10px; margin-bottom: 15px; background: rgba(0,20,0,0.9);">
            <div style="font-size: 10px; border-bottom: 1px solid #030; margin-bottom: 10px;">>> NETWORK_USERS</div>
            <div id="allUsersList">Scanning...</div>
        </div>

        <div class="post-box">
            <h3 id="boxHeader" style="font-size: 10px; margin: 0 0 10px 0; color: #fff;">>> SYSTEM_INPUT_STREAM</h3>
            <textarea id="postText" rows="3" placeholder="Input status data..."></textarea>
            <div class="box-controls">
                <label for="fileInput" class="file-label" id="fileStatus">ATTACH_MEDIA (IMG/VID)</label>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display:none;">
            </div>
            <div style="display: flex; gap: 8px; margin-top: 12px;">
                <button class="btn-nav" id="btnExecute" style="flex: 2;">EXECUTE_POST</button>
                <button class="btn-nav" id="btnCancelEdit" style="display: none; border-color: #f00; color: #f00; flex: 1;">ABORT</button>
            </div>
        </div>

        <div id="newsFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, getDocs, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, updateDoc, arrayUnion, arrayRemove, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUid = "", userData = {};
        let editMode = false, editingPostId = null;

        // --- Core Helpers ---
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = `[ ${msg} ]`;
            t.style.display = 'block';
            setTimeout(() => { t.style.display = 'none'; }, 2500);
        }

        window.toggleSection = (id) => {
            const el = document.getElementById(id);
            const isVisible = el.style.display === 'block';
            document.getElementById('notiPanel').style.display = 'none';
            document.getElementById('userDiscovery').style.display = 'none';
            el.style.display = isVisible ? 'none' : 'block';
            if(id === 'userDiscovery' && !isVisible) loadAllUsers();
        };

        async function uploadMedia(file) {
            const type = file.type.startsWith('video') ? 'video' : 'image';
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", "my-upload");
            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/dbrgjktoz/${type}/upload`, { method: "POST", body: formData });
                const data = await res.json();
                return { url: data.secure_url, type };
            } catch (e) { return null; }
        }

        // --- Auth ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                onSnapshot(doc(db, "users", currentUid), (snap) => {
                    if (snap.exists()) {
                        userData = snap.data();
                        document.getElementById('userDisplay').textContent = `USER: ${userData.fullName.toUpperCase()}`;
                        document.getElementById('notiCount').textContent = userData.friendRequests?.length || 0;
                        updateNotiUI(userData.friendRequests || []);
                    }
                });
                loadPosts();
            } else { window.location.href = "login.html"; }
        });

        // --- Feed & Rendering ---
        function loadPosts() {
            onSnapshot(query(collection(db, "posts"), orderBy("createdAt", "desc")), (snapshot) => {
                const feed = document.getElementById('newsFeed');
                feed.innerHTML = "";
                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const pid = postDoc.id;
                    const isLiked = post.likes?.includes(currentUid);
                    let mediaHTML = post.media ? (post.mediaType === 'video' ? `<video src="${post.media}" controls></video>` : `<img src="${post.media}" class="post-media">`) : "";
                    
                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPhoto}" class="post-user-img">
                            <div class="post-info">
                                <div style="display:flex; align-items:center; gap:8px;">
                                    <span class="post-user-name">${post.userName}</span>
                                    <button class="btn-nav" style="padding:2px 5px; font-size:8px; border-radius:3px;" onclick="window.location.href='chat.html?id=${post.userId}'">MESSAGE</button>
                                </div>
                                <span class="timestamp">${post.createdAt ? new Date(post.createdAt.toDate()).toLocaleString() : "Syncing..."}</span>
                            </div>
                            <div class="dot-btn" onclick="window.toggleMenu('m-${pid}')">⋮</div>
                            <div id="m-${pid}" class="menu-dropdown">
                                ${post.userId === currentUid ? `<button onclick="window.startEdit('${pid}', \`${post.content}\`)">EDIT_ENTRY</button><button onclick="window.deletePost('${pid}')">WIPE_DATA</button>` : `<button>REPORT</button>`}
                            </div>
                        </div>
                        <div style="margin:8px 0; white-space:pre-wrap; font-size:14px;">${post.content}</div>
                        ${mediaHTML}
                        <div class="post-actions">
                            <div class="action-btn ${isLiked?'liked':''}" onclick="window.handleLike('${pid}', ${isLiked})">❤️ ${post.likes?.length || 0}</div>
                            <div class="action-btn" onclick="window.toggleComments('${pid}')">💬 ${post.comments?.length || 0}</div>
                        </div>
                        <div class="comment-section" id="sec-${pid}">
                            <div id="list-${pid}"></div>
                            <div class="comment-input-area">
                                <div id="cinfo-${pid}" style="font-size:9px; color:#0f0; margin-bottom:4px; display:none;"></div>
                                <div class="input-row">
                                    <input type="text" id="inp-${pid}" class="comment-input" placeholder="Enter comment..." oninput="window.handleCommentUI('${pid}')">
                                    <label style="cursor:pointer; font-size:18px;">📷<input type="file" id="cfile-${pid}" style="display:none;" onchange="window.handleCommentUI('${pid}')"></label>
                                    <button class="btn-nav" onclick="window.addComment('${pid}')">SEND</button>
                                    <button id="cx-${pid}" class="btn-nav comment-cancel-btn" onclick="window.clearComment('${pid}')">X</button>
                                </div>
                            </div>
                        </div>`;
                    feed.appendChild(card);
                    window.renderComments(pid, post.comments);
                });
            });
        }

        // --- Comment Logic ---
        window.handleCommentUI = (pid) => {
            const text = document.getElementById(`inp-${pid}`).value.trim();
            const file = document.getElementById(`cfile-${pid}`).files[0];
            const cancelBtn = document.getElementById(`cx-${pid}`);
            const info = document.getElementById(`cinfo-${pid}`);
            
            if(file) { info.textContent = `>> FILE_READY: ${file.name.substring(0,12)}...`; info.style.display = 'block'; }
            else { info.style.display = 'none'; }
            
            cancelBtn.style.display = (text || file) ? 'block' : 'none';
        };

        window.clearComment = (pid) => {
            document.getElementById(`inp-${pid}`).value = "";
            document.getElementById(`cfile-${pid}`).value = "";
            window.handleCommentUI(pid);
        };

        window.renderComments = (pid, comments) => {
            const list = document.getElementById(`list-${pid}`);
            if(!list || !comments) return;
            list.innerHTML = comments.map(c => `
                <div class="comment-item">
                    <b style="color:#0f0; font-size:10px;">${c.userName}:</b> <span style="color:#fff;">${c.text}</span>
                    ${c.media ? (c.mediaType === 'video' ? `<video src="${c.media}" class="comment-media" controls></video>` : `<img src="${c.media}" class="comment-media">`) : ""}
                </div>`).join('');
        };

        window.addComment = async (pid) => {
            const input = document.getElementById(`inp-${pid}`);
            const file = document.getElementById(`cfile-${pid}`).files[0];
            const text = input.value.trim();
            if(!text && !file) return;

            showToast("UPLOADING...");
            let mData = { url: "", type: "" };
            if (file) { const res = await uploadMedia(file); if (res) mData = res; }

            await updateDoc(doc(db, "posts", pid), {
                comments: arrayUnion({
                    userId: currentUid, userName: userData.fullName,
                    text: text, media: mData.url, mediaType: mData.type,
                    createdAt: Date.now()
                })
            });
            window.clearComment(pid);
            showToast("DATA_SAVED");
        };

        // --- Post Logic ---
        document.getElementById('fileInput').onchange = (e) => {
            document.getElementById('fileStatus').textContent = e.target.files[0] ? `READY: ${e.target.files[0].name.substring(0,15)}` : "ATTACH_MEDIA";
        };

        document.getElementById('btnExecute').onclick = async () => {
            const text = document.getElementById('postText').value.trim();
            const file = document.getElementById('fileInput').files[0];
            if (!text && !file && !editMode) return;
            
            const btn = document.getElementById('btnExecute');
            btn.disabled = true; btn.textContent = "UPLOADING...";
            
            let mData = { url: "", type: "" };
            if (file) { const res = await uploadMedia(file); if (res) mData = res; }
            
            try {
                if (editMode) {
                    const up = { content: text };
                    if (mData.url) { up.media = mData.url; up.mediaType = mData.type; }
                    await updateDoc(doc(db, "posts", editingPostId), up);
                    window.resetEditor();
                } else {
                    await addDoc(collection(db, "posts"), {
                        userId: currentUid, userName: userData.fullName, userPhoto: userData.photoURL,
                        content: text, media: mData.url, mediaType: mData.type,
                        createdAt: serverTimestamp(), likes: [], comments: []
                    });
                }
                document.getElementById('postText').value = "";
                document.getElementById('fileInput').value = "";
                document.getElementById('fileStatus').textContent = "ATTACH_MEDIA";
                showToast("SYNC_OK");
            } catch(e) { showToast("FAILED"); }
            btn.disabled = false; btn.textContent = editMode ? "UPDATE_ENTRY" : "EXECUTE_POST";
        };

        // --- UI Interactions ---
        window.handleLike = async (id, liked) => { await updateDoc(doc(db, "posts", id), { likes: liked ? arrayRemove(currentUid) : arrayUnion(currentUid) }); };
        window.toggleComments = (id) => { const s = document.getElementById(`sec-${id}`); s.style.display = (s.style.display === 'block') ? 'none' : 'block'; };
        window.toggleMenu = (id) => { document.querySelectorAll('.menu-dropdown').forEach(m => m.style.display = (m.id === id && m.style.display !== 'block') ? 'block' : 'none'); };
        window.deletePost = (pid) => { if(confirm("Permanently wipe this entry?")) { deleteDoc(doc(db, "posts", pid)); showToast("WIPED"); } };
        window.startEdit = (id, text) => {
            editMode = true; editingPostId = id;
            document.getElementById('postText').value = text;
            document.getElementById('boxHeader').textContent = ">> EDITING_ENTRY_ID: " + id.substring(0,5);
            document.getElementById('btnExecute').textContent = "UPDATE_ENTRY";
            document.getElementById('btnCancelEdit').style.display = "block";
            window.scrollTo(0,0);
        };
        window.resetEditor = () => {
            editMode = false; editingPostId = null;
            document.getElementById('boxHeader').textContent = ">> SYSTEM_INPUT_STREAM";
            document.getElementById('btnExecute').textContent = "EXECUTE_POST";
            document.getElementById('btnCancelEdit').style.display = "none";
            document.getElementById('postText').value = "";
        };
        document.getElementById('btnCancelEdit').onclick = window.resetEditor;

        // Matrix Background
        const canvas = document.getElementById('bg'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0,0,0,0.1)"; ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "15px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(33+Math.random()*94), i*16, y*16);
                if(y*16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
