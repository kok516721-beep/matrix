<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - News Feed</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow-x: hidden; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.7; }

        .navbar { 
            border-bottom: 2px solid #0f0; padding: 15px 25px; 
            display: flex; justify-content: space-between; align-items: center; 
            background: rgba(0, 20, 0, 0.85); position: sticky; top: 0; z-index: 100; 
        }
        .btn-nav { border: 1px solid #0f0; color: #0f0; background: transparent; padding: 8px 15px; cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; }
        .btn-nav:hover { background: #0f0; color: #000; box-shadow: 0 0 10px #0f0; }

        .main-container { max-width: 600px; margin: 20px auto; padding: 10px; position: relative; z-index: 1; }
        
        .post-box, .post-card { 
            border: 1px solid #0f0; 
            background: rgba(0, 15, 0, 0.4); 
            padding: 15px; margin-bottom: 20px; box-shadow: 0 0 15px rgba(0, 255, 0, 0.1); 
            backdrop-filter: blur(2px); 
        }
        
        textarea { width: 100%; background: rgba(0, 0, 0, 0.7); border: 1px solid #0f0; color: #0f0; padding: 10px; box-sizing: border-box; resize: none; outline: none; }
        
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid #030; padding-bottom: 8px; }
        .post-user-img { width: 35px; height: 35px; border: 1px solid #0f0; border-radius: 50%; object-fit: cover; }
        .post-info { flex-grow: 1; }
        .post-user-name { font-weight: bold; font-size: 14px; color: #fff; }
        .post-time { font-size: 10px; color: #0a0; display: block; }
        
        .menu-container { position: relative; }
        .post-menu-btn { cursor: pointer; color: #0f0; font-size: 20px; padding: 0 5px; }
        .menu-dropdown { 
            position: absolute; right: 0; top: 25px; background: #000; 
            border: 1px solid #0f0; display: none; z-index: 100; min-width: 120px;
        }
        .menu-dropdown button { 
            display: block; width: 100%; padding: 10px; background: none; 
            border: none; color: #0f0; text-align: left; cursor: pointer; font-size: 12px;
        }
        .menu-dropdown button:hover { background: #0f0; color: #000; }

        .post-content { white-space: pre-wrap; margin: 10px 0; font-size: 14px; color: #0f0; }
        .post-media img, .post-media video { width: 100%; border: 1px solid #030; margin-top: 10px; max-height: 450px; object-fit: contain; }
        .file-label { display: inline-block; border: 1px dashed #0f0; padding: 5px 10px; margin: 10px 0; cursor: pointer; font-size: 11px; }
        #fileInput { display: none; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>
    <div class="navbar">
        <div id="userDisplay">[ CONNECTING... ]</div>
        <a href="profile.html" class="btn-nav">PROFILE</a>
    </div>

    <div class="main-container">
        <div class="post-box" id="mainPostBox">
            <h3 id="boxHeader" style="font-size: 12px; margin-top: 0;">>> NEW SEQUENCE</h3>
            <textarea id="postText" rows="3" placeholder="Initializing thought sequence..."></textarea>
            <label for="fileInput" class="file-label" id="fileLabel">>> ATTACH MEDIA</label>
            <input type="file" id="fileInput" accept="image/*,video/*">
            <div id="editPreview" style="display:none; font-size: 10px; color: yellow; margin-bottom: 10px;">* Media change is optional</div>
            
            <div style="display: flex; gap: 10px;">
                <button class="btn-nav" id="btnExecute" style="flex-grow: 1;">EXECUTE POST</button>
                <button class="btn-nav" id="btnCancelEdit" style="display: none; background: #300;">CANCEL</button>
            </div>
        </div>

        <div id="newsFeed"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const CLOUD_NAME = "dbrgjktoz"; 
        const UPLOAD_PRESET = "my-upload"; 

        let currentUid = "", currentEmail = "", currentUserName = "User", currentUserPhoto = "";
        let editMode = false;
        let editingPostId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid; currentEmail = user.email;
                const userDoc = await getDoc(doc(db, "users", currentUid));
                if (userDoc.exists()) {
                    currentUserName = userDoc.data().fullName || "User";
                    currentUserPhoto = userDoc.data().photoURL || "https://cdn-icons-png.flaticon.com/512/711/711769.png";
                }
                document.getElementById('userDisplay').textContent = "CONNECTED: " + currentUserName.toUpperCase();
                loadPosts();
            } else { window.location.href = "login.html"; }
        });

        async function uploadMedia(file) {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            const type = file.type.startsWith("video") ? "video" : "image";
            const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${type}/upload`, { method: "POST", body: formData });
            const data = await res.json();
            return { url: data.secure_url, type };
        }

        // Main Button Logic (Post or Update)
        document.getElementById('btnExecute').onclick = async () => {
            const text = document.getElementById('postText').value.trim();
            const file = document.getElementById('fileInput').files[0];
            const btn = document.getElementById('btnExecute');

            if (!text && !file && !editMode) return;

            btn.textContent = editMode ? "UPDATING..." : "UPLOADING...";
            btn.disabled = true;

            let mediaUrl = "", mediaType = "";
            if (file) {
                try {
                    const up = await uploadMedia(file);
                    mediaUrl = up.url; mediaType = up.type;
                } catch(e) { alert("Upload Failed!"); }
            }

            try {
                if (editMode) {
                    // Update Mode
                    const updateData = { content: text };
                    if (mediaUrl) { 
                        updateData.media = mediaUrl; 
                        updateData.type = mediaType; 
                    }
                    await updateDoc(doc(db, "posts", editingPostId), updateData);
                    resetPostBox();
                } else {
                    // Normal Post Mode
                    await addDoc(collection(db, "posts"), {
                        userId: currentUid, userName: currentUserName, userPhoto: currentUserPhoto,
                        content: text, media: mediaUrl, type: mediaType, createdAt: serverTimestamp()
                    });
                }
                document.getElementById('postText').value = "";
                document.getElementById('fileInput').value = "";
            } catch (e) { alert("Action Failed!"); }
            
            btn.textContent = "EXECUTE POST";
            btn.disabled = false;
        };

        function resetPostBox() {
            editMode = false;
            editingPostId = null;
            document.getElementById('boxHeader').textContent = ">> NEW SEQUENCE";
            document.getElementById('boxHeader').style.color = "#0f0";
            document.getElementById('btnExecute').textContent = "EXECUTE POST";
            document.getElementById('btnCancelEdit').style.display = "none";
            document.getElementById('editPreview').style.display = "none";
            document.getElementById('postText').value = "";
            document.getElementById('fileInput').value = "";
        }

        document.getElementById('btnCancelEdit').onclick = resetPostBox;

        function loadPosts() {
            const q = query(collection(db, "posts"), orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const feed = document.getElementById('newsFeed');
                feed.innerHTML = "";
                snapshot.forEach((postDoc) => {
                    const post = postDoc.data();
                    const postId = postDoc.id;
                    const isOwner = post.userId === currentUid || currentEmail === "soeer73@gmail.com";
                    const time = post.createdAt ? new Date(post.createdAt.seconds * 1000).toLocaleString() : "...";

                    const card = document.createElement('div');
                    card.className = "post-card";
                    card.innerHTML = `
                        <div class="post-header">
                            <img src="${post.userPhoto}" class="post-user-img">
                            <div class="post-info">
                                <span class="post-user-name">${post.userName}</span>
                                <span class="post-time">${time}</span>
                            </div>
                            ${isOwner ? `
                            <div class="menu-container">
                                <div class="post-menu-btn" onclick="toggleMenu('${postId}')">⋮</div>
                                <div id="menu-${postId}" class="menu-dropdown">
                                    <button onclick="scrollToEdit('${postId}', \`${post.content.replace(/`/g, '\\`').replace(/\n/g, '\\n')}\`)">EDIT</button>
                                    <button style="color:red;" onclick="deletePost('${postId}')">DELETE</button>
                                </div>
                            </div>` : ""}
                        </div>
                        <div class="post-content">${post.content}</div>
                        ${post.media ? `<div class="post-media">${post.type === 'video' ? `<video src="${post.media}" controls></video>` : `<img src="${post.media}">`}</div>` : ""}
                    `;
                    feed.appendChild(card);
                });
            });
        }

        // Global functions
        window.toggleMenu = (id) => {
            document.querySelectorAll('.menu-dropdown').forEach(m => { if(m.id !== `menu-${id}`) m.style.display = 'none'; });
            const menu = document.getElementById(`menu-${id}`);
            menu.style.display = menu.style.display === "block" ? "none" : "block";
        };

        window.deletePost = async (id) => {
            if(confirm("Confirm deletion?")) await deleteDoc(doc(db, "posts", id));
        };

        // This function "calls" the post back to the top box
        window.scrollToEdit = (id, text) => {
            editMode = true;
            editingPostId = id;
            
            // UI Changes
            document.getElementById('boxHeader').textContent = ">> EDITING SEQUENCE";
            document.getElementById('boxHeader').style.color = "yellow";
            document.getElementById('postText').value = text;
            document.getElementById('btnExecute').textContent = "UPDATE POST";
            document.getElementById('btnCancelEdit').style.display = "block";
            document.getElementById('editPreview').style.display = "block";
            
            // Scroll to Top
            window.scrollTo({ top: 0, behavior: 'smooth' });
            document.querySelectorAll('.menu-dropdown').forEach(m => m.style.display = 'none');
        };

        // Matrix Animation
        const canvas = document.getElementById('bg'); const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width/16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(String.fromCharCode(33 + Math.random() * 94), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
    </script>
</body>
</html>
