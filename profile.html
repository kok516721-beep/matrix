<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - Identity Terminal</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; overflow: hidden; }
        
        /* Matrix Background Canvas */
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }

        .profile-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; min-height: 100vh; width: 100%;
        }

        .profile-container { 
            background: rgba(0, 20, 0, 0.9); border: 2px solid #0f0; 
            padding: 30px; width: 330px; box-shadow: 0 0 20px #0f0; 
            z-index: 10; text-align: center; position: relative;
        }

        .photo-display { 
            width: 110px; height: 110px; border: 2px solid #0f0; 
            margin: 0 auto 15px; border-radius: 5px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
            background: #000; box-shadow: 0 0 10px #0f0;
        }
        .photo-display img, .photo-display video { width: 100%; height: 100%; object-fit: cover; }
        
        h2 { border-bottom: 1px solid #0f0; padding-bottom: 10px; text-shadow: 0 0 10px #0f0; margin-bottom: 20px; }
        
        .info-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 11px; color: #0a0; display: block; margin-bottom: 5px; }
        
        input, select { 
            width: 100%; padding: 10px; background: #000; border: 1px solid #0f0; 
            color: #0f0; outline: none; box-sizing: border-box; 
        }
        
        .upload-btn { 
            display: block; width: 100%; padding: 8px; border: 1px dashed #0f0; 
            margin-bottom: 15px; cursor: pointer; font-size: 11px; color: #0f0;
        }
        
        .btn { 
            width: 100%; padding: 12px; background: transparent; border: 1px solid #0f0; 
            color: #0f0; font-weight: bold; cursor: pointer; margin-top: 10px; 
        }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        
        .status { margin-top: 15px; font-size: 12px; font-weight: bold; }
        #fileInput { display: none; }
        a { color:#0f0; text-decoration:none; font-size:12px; display:block; margin-top:15px; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>

    <div class="profile-wrapper">
        <div class="profile-container">
            <h2>>> PROFILE <<</h2>

            <div class="photo-display" id="mediaContainer">
                <img id="viewPhoto" src="https://cdn-icons-png.flaticon.com/512/711/711769.png">
            </div>

            <label for="fileInput" class="upload-btn">UPLOAD PHOTO / VIDEO</label>
            <input type="file" id="fileInput" accept="image/*,video/*">

            <div class="info-group">
                <label>FULL NAME</label>
                <input type="text" id="profName" placeholder="Loading name...">
            </div>

            <div class="info-group">
                <label>PRIVACY (WHO CAN SEE?)</label>
                <select id="privacySet">
                    <option value="public">PUBLIC (EVERYONE)</option>
                    <option value="private">ONLY ME (PRIVATE)</option>
                </select>
            </div>

            <button class="btn" id="btnUpdate">UPDATE PROFILE</button>
            <button class="btn" style="border-color: #ffa500; color: #ffa500;" id="btnResetPass">RESET PASSWORD</button>
            <button class="btn" style="border-color: #ff4444; color: #ff4444; margin-top: 20px;" id="btnLogout">LOGOUT</button>
                
            <div id="status" class="status"></div>
            <a href="home.html"><< HOME</a>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        const CLOUD_NAME = "dbrgjktoz"; 
        const UPLOAD_PRESET = "my-upload"; 

        let currentUid = "";

        // Canvas Effect
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        const columns = Math.floor(canvas.width / 16);
        const drops = Array(columns).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = "16px monospace";
            for (let i = 0; i < drops.length; i++) {
                const text = String.fromCharCode(Math.random() * 128);
                ctx.fillText(text, i * 16, drops[i] * 16);
                if (drops[i] * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        function displayMedia(url) {
            const container = document.getElementById('mediaContainer');
            if (url && url.includes("/video/upload/")) {
                container.innerHTML = `<video src="${url}" autoplay muted loop playsinline></video>`;
            } else if(url) {
                container.innerHTML = `<img src="${url}">`;
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                const docSnap = await getDoc(doc(db, "users", currentUid));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('profName').value = data.fullName || "";
                    document.getElementById('privacySet').value = data.privacy || "public";
                    if(data.photoURL) displayMedia(data.photoURL);
                }
            } else { window.location.href = "login.html"; }
        });

        document.getElementById('fileInput').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const status = document.getElementById('status');
            status.style.color = "#ffa500";
            status.textContent = "UPLOADING MEDIA...";

            const formData = new FormData();
            formData.append("file", file);
            formData.append("upload_preset", UPLOAD_PRESET);
            const resourceType = file.type.startsWith("video") ? "video" : "image";

            try {
                const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/${resourceType}/upload`, { method: "POST", body: formData });
                const data = await res.json();
                if (data.secure_url) {
                    await updateDoc(doc(db, "users", currentUid), { photoURL: data.secure_url });
                    displayMedia(data.secure_url);
                    status.style.color = "#0f0";
                    status.textContent = "PROFILE PHOTO UPDATED!";
                }
            } catch (err) { status.textContent = "UPLOAD FAILED!"; }
        };

        document.getElementById('btnUpdate').onclick = async () => {
            const name = document.getElementById('profName').value.trim();
            const privacy = document.getElementById('privacySet').value;
            try {
                await updateDoc(doc(db, "users", currentUid), { fullName: name, privacy: privacy });
                document.getElementById('status').style.color = "#0f0";
                document.getElementById('status').textContent = "SYNC SUCCESSFUL!";
            } catch (e) { document.getElementById('status').textContent = "SYNC FAILED!"; }
        };

        document.getElementById('btnResetPass').onclick = async () => {
            await sendPasswordResetEmail(auth, auth.currentUser.email);
            document.getElementById('status').textContent = "RESET LINK SENT TO EMAIL!";
        };

        document.getElementById('btnLogout').onclick = async () => {
            await auth.signOut();
            window.location.href = "login.html";
        };
    </script>
</body>
            </html>
