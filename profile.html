<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix - Profile Terminal</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', monospace; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .profile-container { background: rgba(0, 20, 0, 0.9); border: 2px solid #0f0; padding: 30px; margin-top: 30px; width: 350px; box-shadow: 0 0 20px #0f0; z-index: 10; text-align: center; }
        
        /* Profile Photo Center Style */
        .photo-display { 
            width: 120px; height: 120px; 
            border: 2px solid #0f0; 
            margin: 0 auto 20px; 
            display: flex; align-items: center; justify-content: center;
            background: #000; overflow: hidden;
            box-shadow: 0 0 15px #0f0;
        }
        .photo-display img { width: 100%; height: 100%; object-fit: cover; }
        
        h2 { border-bottom: 1px solid #0f0; padding-bottom: 10px; text-shadow: 0 0 10px #0f0; margin-bottom: 25px; }
        .info-group { margin-bottom: 15px; text-align: left; }
        label { font-size: 11px; color: #0a0; display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 10px; background: #000; border: 1px solid #0f0; color: #0f0; outline: none; box-sizing: border-box; }
        
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid #0f0; color: #0f0; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .btn:hover { background: #0f0; color: #000; box-shadow: 0 0 15px #0f0; }
        
        .status { margin-top: 15px; font-size: 13px; font-weight: bold; min-height: 18px; }
        #bg { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.3; }
        .back-link { margin-top: 20px; color: #0f0; text-decoration: none; font-size: 13px; display: block; opacity: 0.7; }
    </style>
</head>
<body>
    <canvas id="bg"></canvas>

    <div class="profile-container">
        <h2>>> PROFILE <<</h2>

        <div class="photo-display">
            <img id="viewPhoto" src="https://cdn-icons-png.flaticon.com/512/711/711769.png" alt="Profile">
        </div>
        
        <div class="info-group">
            <label>DISPLAY NAME</label>
            <input type="text" id="profName" placeholder="Accessing identity...">
        </div>

        <div class="info-group">
            <label>PHOTO URL (GMAIL PHOTO LINK)</label>
            <input type="text" id="profPhoto" placeholder="Paste image link here">
        </div>

        <div class="info-group">
            <label>PRIVACY PROTOCOL</label>
            <select id="privacySet">
                <option value="public">PUBLIC</option>
                <option value="private">ONLY ME</option>
            </select>
        </div>

        <button class="btn" id="btnUpdate">UPDATE IDENTITY</button>
        <button class="btn" style="border-color: #ffa500; color: #ffa500; font-size: 11px;" id="btnResetPass">RESET PASSWORD</button>

        <div id="status" class="status"></div>
        <a href="home.html" class="back-link"><< RETURN TO HOME</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBDTfhbq7LgK7_Jt57-h8Bbh9vxjNokRjg",
            authDomain: "my-github-page-80ed1.firebaseapp.com",
            projectId: "my-github-page-80ed1",
            storageBucket: "my-github-page-80ed1.firebasestorage.app",
            messagingSenderId: "609164113672",
            appId: "1:609164113672:web:90bab379209d122b32debd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const statusDiv = document.getElementById('status');
        const viewPhoto = document.getElementById('viewPhoto');
        let currentUid = "";

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUid = user.uid;
                const userRef = doc(db, "users", currentUid);
                const docSnap = await getDoc(userRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('profName').value = data.fullName || "";
                    document.getElementById('profPhoto').value = data.photoURL || "";
                    document.getElementById('privacySet').value = data.privacy || "public";
                    if(data.photoURL) viewPhoto.src = data.photoURL;
                } else {
                    document.getElementById('profName').placeholder = "New User Detected";
                }
            } else {
                window.location.href = "login.html";
            }
        });

        document.getElementById('btnUpdate').onclick = async () => {
            const name = document.getElementById('profName').value;
            const photo = document.getElementById('profPhoto').value;
            const privacy = document.getElementById('privacySet').value;
            const cleanName = name.replace(/<\/?[^>]+(>|$)/g, "");

            try {
                // setDoc with merge: true ကိုသုံးရင် data မရှိလည်း အသစ်ဆောက်ပေးမယ်၊ ရှိရင် update လုပ်မယ်
                await setDoc(doc(db, "users", currentUid), {
                    fullName: cleanName,
                    photoURL: photo,
                    privacy: privacy,
                    lastUpdated: new Date()
                }, { merge: true });

                if(photo) viewPhoto.src = photo;
                statusDiv.style.color = "#0f0";
                statusDiv.textContent = "SUCCESS: Profile Updated!";
            } catch (error) {
                statusDiv.style.color = "#f00";
                statusDiv.textContent = "FAILED: " + error.message;
            }
        };

        document.getElementById('btnResetPass').onclick = async () => {
            if (auth.currentUser) {
                await sendPasswordResetEmail(auth, auth.currentUser.email);
                statusDiv.style.color = "#ffa500";
                statusDiv.textContent = "Password reset link sent!";
            }
        };

        // Matrix Effect
        const canvas = document.getElementById('bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function draw() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
        </html>
